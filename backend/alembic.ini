# ============================================================
# Alembic configuration
# FIX: script_location was "backend/alembic" which works when
# running from the repo root locally, but breaks inside Docker
# where backend/ contents are copied directly into /app.
# Changed to just "alembic" so it works in BOTH contexts.
# ============================================================

[alembic]
# path to migration scripts — relative to THIS file's location
script_location = alembic

# file name template for new migrations
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path prepend
prepend_sys_path = .

# timezone for migration file timestamps
# timezone = UTC+00:00

# max slug length
truncate_slug_length = 40

# always run env during revision command
revision_environment = false

# allow .pyc files as revisions
sourceless = false

# version locations — %(here)s = directory of THIS alembic.ini file
version_locations = %(here)s/alembic/versions

# version path separator
version_path_separator = os

# search recursively
recursive_version_locations = false

# output encoding
output_encoding = utf-8

# DATABASE URL — overridden at runtime by env.py reading DATABASE_URL env var.
# This placeholder is never actually used.
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/dbname


[post_write_hooks]
# black formatter on new migration files — commented out because
# black is not installed in the Docker image. Uncomment locally if you want it.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
